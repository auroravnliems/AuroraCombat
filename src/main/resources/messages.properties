# AuroraCombat Messages - Paper 1.21.1+
# Hex colors: &#RRGGBB
# !actionbar prefix = show above hotbar

Prefix=&#FB287AA&#FB3386u&#FC3F91r&#FC4A9Do&#FC56A8r&#FD61B4a&#FD6DBFC&#FE78CBo&#FE84D6m&#FE8FE2b&#FF9BEDa&#FFA6F9t &#C084F5➤

# PvP Toggle
PvP_Disabled={prefix} &aPvP has been disabled! You are now protected.
PvP_Enabled={prefix} &cPvP has been enabled! You can now fight.
PvP_Already_Enabled={prefix} &7Your PvP is already enabled.
PvP_Already_Disabled={prefix} &7Your PvP is already disabled.
PvP_Toggle_Cooldown={prefix} &cWait &e{time}s &cbefore toggling again.
Attack_Denied_You=!actionbar {prefix} &#c9453eYou are protected by PvP!
Attack_Denied_Other=!actionbar {prefix} &f{player} &#c9453eis protected by PvP!
PvP_Force_Enabled_WorldGuard={prefix} &6PvP protection has been disabled in this region.

# Combat Tag
Tagged_Attacker={prefix} &7You attacked &f{player}&7! No escaping!
Tagged_Defender={prefix} &7Attacked by &f{player}&7! No escaping!
Out_Of_Combat={prefix} &aYou are out of combat.
Out_Of_Combat_ActionBar=!actionbar &aOut of combat!
Command_Denied_InCombat={prefix} &cCommand blocked! You are in combat!
Block_Place_Blocked_InCombat=!actionbar {prefix} &cCannot place blocks while in combat!
Block_Break_Blocked_InCombat=!actionbar {prefix} &cCannot break blocks while in combat!
Eating_Blocked_InCombat=!actionbar {prefix} &cCannot eat while in combat!
Elytra_Blocked_InCombat=!actionbar {prefix} &cCannot use Elytra while in combat!
EnderPearl_Blocked_InCombat={prefix} &cCannot use Ender Pearl while in combat!
ChorusFruit_Blocked_InCombat={prefix} &cCannot eat Chorus Fruit while in combat!
Riptide_Blocked_InCombat={prefix} &4Cannot use Riptide while in combat!
Teleport_Blocked_InCombat={prefix} &cCannot teleport while in combat!
Portal_Blocked_InCombat={prefix} &cCannot enter a portal while in combat!

# Combat Log
Combat_Log_Broadcast=&6[AuroraCombat] &f{player} &cattempted to escape combat!

# Newbie Protection
Newbie_Protection_Active={prefix} &aNewbie protection is active! Use &f/newbie disable &ato turn it off.
Newbie_Attack_Denied=!actionbar {prefix} &f{player} &#c9453eis protected by newbie protection!
Newbie_Disabled={prefix} &6Newbie protection disabled. You can now fight!
Newbie_Expired={prefix} &6Your newbie protection has expired!
Newbie_Command_Blocked={prefix} &cThis command is blocked while you are under newbie protection!
Newbie_Not_Protected={prefix} &cYou do not have newbie protection.
Newbie_Cannot_Disable={prefix} &cNewbie protection cannot be disabled manually.

# Anti Border Hopping
PushBack_Message=!actionbar &#FF4444⚠ &cYou cannot enter a safe zone while in combat!
Border_EnderPearl_Blocked={prefix} &cCannot use Ender Pearl to enter a safe zone!

# Item Cooldowns
Item_Cooldown=!actionbar {prefix} &cItem on cooldown! &e{time}s remaining

# Disable On Hit
Fly_Disabled={prefix} &cFlight has been disabled during combat!
GameMode_Disabled={prefix} &cGame mode has been switched to survival!

# Kill / Anti-Abuse
Kill_Abuse_Warning={prefix} &eWarning! One more kill will result in a penalty!
Kill_Abuse_Punished={prefix} &cYou have been penalized for kill abuse!
Respawn_Protected=!actionbar {prefix} &aRespawn protection: &e{time}s

# Admin / Misc
No_Permission={prefix} &cYou do not have permission to do this.
Player_Not_Found={prefix} &cPlayer &f{player}&c not found!
Reload_Success={prefix} &aConfiguration reloaded successfully!
PvPGrant_Received={prefix} &aYou have received temporary PvP protection!
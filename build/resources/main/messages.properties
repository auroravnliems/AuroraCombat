Prefix=&#FB287AA&#FB3386u&#FC3F91r&#FC4A9Do&#FC56A8r&#FD61B4a&#FD6DBFC&#FE78CBo&#FE84D6m&#FE8FE2b&#FF9BEDa&#FFA6F9t &#C084F5➤

# PvP Toggle
PvP_Disabled={prefix} &aPvP đã tắt! Bạn đang được bảo vệ.
PvP_Enabled={prefix} &cPvP đã bật! Bạn có thể chiến đấu.
PvP_Already_Enabled={prefix} &7PvP của bạn đã được bật rồi.
PvP_Already_Disabled={prefix} &7PvP của bạn đã được tắt rồi.
PvP_Toggle_Cooldown={prefix} &cChờ &e{time}s &ctrước khi thay đổi lại.
Attack_Denied_You=!actionbar {prefix} &#c9453eBạn đang được bảo vệ PvP!
Attack_Denied_Other=!actionbar {prefix} &f{player} &#c9453eđang được bảo vệ PvP!
PvP_Force_Enabled_WorldGuard={prefix} &6Bảo vệ PvP đã bị tắt trong khu vực này.

# Combat Tag
Tagged_Attacker={prefix} &7Bạn đã tấn công &f{player}&7! Không được thoát!
Tagged_Defender={prefix} &7Bị tấn công bởi &f{player}&7! Không được thoát!
Out_Of_Combat={prefix} &aBạn đã thoát khỏi chiến đấu.
Out_Of_Combat_ActionBar=!actionbar &aThoát khỏi chiến đấu!
Command_Denied_InCombat={prefix} &cLệnh bị chặn! Bạn đang trong chiến đấu!
Block_Place_Blocked_InCombat=!actionbar {prefix} &cKhông thể đặt khối khi đang chiến đấu!
Block_Break_Blocked_InCombat=!actionbar {prefix} &cKhông thể phá khối khi đang chiến đấu!
Eating_Blocked_InCombat=!actionbar {prefix} &cKhông thể ăn khi đang chiến đấu!
Elytra_Blocked_InCombat=!actionbar {prefix} &cKhông thể dùng Elytra khi đang chiến đấu!
EnderPearl_Blocked_InCombat={prefix} &cKhông thể dùng Ender Pearl khi đang chiến đấu!
ChorusFruit_Blocked_InCombat={prefix} &cKhông thể ăn Chorus Fruit khi đang chiến đấu!
Riptide_Blocked_InCombat={prefix} &4Không thể dùng Riptide khi đang chiến đấu!
Teleport_Blocked_InCombat={prefix} &cKhông thể dịch chuyển khi đang chiến đấu!
Portal_Blocked_InCombat={prefix} &cKhông thể vào cổng dịch chuyển khi đang chiến đấu!

# Combat Log
Combat_Log_Broadcast=&6[AuroraCombat] &f{player} &cđã cố thoát khỏi chiến đấu!

# Newbie Protection
Newbie_Protection_Active={prefix} &aBảo vệ người mới đang hoạt động! Dùng &f/newbie disable &ađể tắt.
Newbie_Attack_Denied=!actionbar {prefix} &f{player} &#c9453eđang được bảo vệ người mới!
Newbie_Disabled={prefix} &6Bảo vệ người mới đã tắt. Bạn có thể chiến đấu!
Newbie_Expired={prefix} &6Bảo vệ người mới của bạn đã hết hạn!
Newbie_Command_Blocked={prefix} &cLệnh này bị chặn khi bạn đang được bảo vệ người mới!
Newbie_Not_Protected={prefix} &cBạn không có bảo vệ người mới.
Newbie_Cannot_Disable={prefix} &cBảo vệ người mới không thể tắt thủ công.

# Anti Border Hopping
PushBack_Message=!actionbar &#FF4444⚠ &cBạn không thể vào khu vực an toàn khi đang chiến đấu!
Border_EnderPearl_Blocked={prefix} &cKhông thể dùng Ender Pearl để vào khu vực an toàn!

# Item Cooldowns
Item_Cooldown=!actionbar {prefix} &cVật phẩm đang hồi chiêu! Còn &e{time}s

# Disable On Hit
Fly_Disabled={prefix} &cBay đã bị tắt khi chiến đấu!
GameMode_Disabled={prefix} &cChế độ chơi đã chuyển về sinh tồn!

# Kill / Anti-Abuse
Kill_Abuse_Warning={prefix} &eCảnh báo! Thêm một lần giết nữa sẽ bị phạt!
Kill_Abuse_Punished={prefix} &cBạn đã bị phạt vì lạm dụng giết người!
Respawn_Protected=!actionbar {prefix} &aBảo vệ hồi sinh: &e{time}s

# Admin / Misc
No_Permission={prefix} &cBạn không có quyền thực hiện điều này.
Player_Not_Found={prefix} &cKhông tìm thấy người chơi &f{player}&c!
Reload_Success={prefix} &aCấu hình đã được tải lại!
PvPGrant_Received={prefix} &aBạn đã nhận được bảo vệ PvP tạm thời!